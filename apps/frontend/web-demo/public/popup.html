<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>safe-ticket popup</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <p class="popup-eyebrow">safe-ticket extension</p>
      <h1>데모 스캔 상태</h1>
      <p id="status" class="popup-status">현재 탭을 확인 중입니다.</p>

      <section class="popup-card">
        <h2>무엇을 보여주나요</h2>
        <ul class="popup-list">
          <li>위험 문구와 계좌/은행 패턴을 패널에 정리합니다.</li>
          <li>응답 근거를 받아 페이지 본문에 바로 빨간 하이라이트를 입힙니다.</li>
          <li>로컬 데모 환경 정보와 현재 탭 상태를 함께 보여줍니다.</li>
        </ul>
      </section>

      <dl class="popup-meta popup-card">
        <h2>연결 정보</h2>
        <div>
          <dt>현재 탭</dt>
          <dd id="current-url">확인 중...</dd>
        </div>
        <div>
          <dt>백엔드</dt>
          <dd>http://localhost:8000</dd>
        </div>
        <div>
          <dt>데모 페이지</dt>
          <dd>http://localhost:3000/product/227242032.html</dd>
        </div>
      </dl>

      <div class="popup-actions">
        <button id="open-demo" type="button">데모 페이지 열기</button>
        <button id="open-report" type="button" hidden>해당 결과 보러 가기</button>
      </div>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
