<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>safe-ticket popup</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-shell">
      <div class="popup-brand">
        <img class="popup-brand-mark" src="icons/safe-ticket-icon-128.png" alt="" aria-hidden="true" />
        <div>
          <p class="popup-eyebrow">safe-ticket</p>
          <h1>거래 스캔</h1>
        </div>
      </div>
      <p id="status" class="popup-status">현재 탭을 확인 중입니다.</p>
      <p id="current-url" class="popup-url">확인 중...</p>

      <div class="popup-actions">
        <button id="open-demo" type="button">상품 데모 열기</button>
        <button id="open-joongna-chat-demo" type="button">중고나라 채팅</button>
        <button id="open-bunjang-chat-demo" type="button">번개장터 채팅</button>
        <button id="open-report" type="button" hidden>최근 결과 보기</button>
      </div>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
