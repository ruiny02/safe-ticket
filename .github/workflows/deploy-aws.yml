name: Deploy to AWS

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to deploy
        required: true
        default: main

concurrency:
  group: deploy-aws-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_branch || 'main' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Docker Compose stack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_sha }}

      - name: Prepare SSH key
        env:
          AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
          AWS_HOST: ${{ secrets.AWS_HOST }}
        run: |
          set -euo pipefail
          test -n "$AWS_SSH_KEY"
          test -n "$AWS_HOST"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$AWS_SSH_KEY" > ~/.ssh/safe-ticket-deploy-key
          chmod 600 ~/.ssh/safe-ticket-deploy-key
          ssh-keyscan -H "$AWS_HOST" >> ~/.ssh/known_hosts

      - name: Package release source
        run: |
          set -euo pipefail
          tar \
            --exclude='.git' \
            --exclude='.tmp' \
            --exclude='.local' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='build' \
            -czf /tmp/safe-ticket-release.tar.gz .

      - name: Upload release source
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
        run: |
          set -euo pipefail
          test -n "$AWS_HOST"
          test -n "$AWS_USER"
          scp -i ~/.ssh/safe-ticket-deploy-key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            /tmp/safe-ticket-release.tar.gz \
            "$AWS_USER@$AWS_HOST:/tmp/safe-ticket-release.tar.gz"

      - name: Deploy on AWS server
        env:
          AWS_HOST: ${{ secrets.AWS_HOST }}
          AWS_USER: ${{ secrets.AWS_USER }}
          AWS_APP_DIR: ${{ secrets.AWS_APP_DIR }}
          DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.event.workflow_run.head_branch || 'main' }}
        run: |
          set -euo pipefail
          test -n "$AWS_HOST"
          test -n "$AWS_USER"
          test -n "$AWS_APP_DIR"
          test -n "$DEPLOY_REF"

          ssh -i ~/.ssh/safe-ticket-deploy-key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "$AWS_USER@$AWS_HOST" \
            "AWS_APP_DIR='$AWS_APP_DIR' DEPLOY_REF='$DEPLOY_REF' bash -s" <<'REMOTE'
          set -euo pipefail

          DEPLOY_DIR="${AWS_APP_DIR}-deploy"
          RELEASE_DIR="${DEPLOY_DIR}/current"
          COMPOSE_PROJECT_NAME="safe-ticket"

          trap 'echo "Deployment failed. Recent service status and logs:"; cd "$RELEASE_DIR" 2>/dev/null && sudo docker compose -p "$COMPOSE_PROJECT_NAME" ps || true; cd "$RELEASE_DIR" 2>/dev/null && sudo docker compose -p "$COMPOSE_PROJECT_NAME" logs --tail=120 backend frontend || true' ERR

          case "$RELEASE_DIR" in
            /home/*/safe-ticket-deploy/current|/home/*/safe-ticket-*-deploy/current) ;;
            *)
              echo "Refusing to remove unexpected release path: $RELEASE_DIR"
              exit 1
              ;;
          esac

          mkdir -p "$DEPLOY_DIR"
          sudo rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"
          tar -xzf /tmp/safe-ticket-release.tar.gz -C "$RELEASE_DIR"
          rm -f /tmp/safe-ticket-release.tar.gz

          if [ -f "$DEPLOY_DIR/.env" ]; then
            cp "$DEPLOY_DIR/.env" "$RELEASE_DIR/.env"
          elif [ -f "$AWS_APP_DIR/.env" ]; then
            cp "$AWS_APP_DIR/.env" "$RELEASE_DIR/.env"
          else
            echo "No .env found in $DEPLOY_DIR or $AWS_APP_DIR; continuing with compose defaults."
          fi

          cd "$RELEASE_DIR"
          echo "Deploying $DEPLOY_REF from $RELEASE_DIR"

          sudo docker compose -p "$COMPOSE_PROJECT_NAME" up -d --build

          wait_for_http() {
            local url="$1"
            local name="$2"
            for attempt in $(seq 1 30); do
              if curl -fsS "$url" >/dev/null; then
                echo "$name is healthy"
                return 0
              fi
              echo "Waiting for $name ($attempt/30)"
              sleep 2
            done
            echo "$name health check failed: $url"
            return 1
          }

          wait_for_http "http://localhost:8000/api/v1/health/live" "backend live endpoint"
          wait_for_http "http://localhost:8000/api/v1/health/ready" "backend ready endpoint"
          wait_for_http "http://localhost:3000/report/" "frontend report page"

          sudo docker compose -p "$COMPOSE_PROJECT_NAME" ps
          REMOTE
