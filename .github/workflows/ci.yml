name: CI

on:
  pull_request:
    branches:
      - infra/aws-lightsail-deployment
  push:
    branches:
      - infra/aws-lightsail-deployment
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Build and smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      VITE_SAFE_TICKET_API_BASE_URL: http://localhost:8000
      VITE_SAFE_TICKET_FRONTEND_BASE_URL: http://localhost:3000

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web demo and extension
        run: pnpm --dir apps/frontend/web-demo build

      - name: Build report page
        run: pnpm --dir apps/frontend/report-page build

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/backend/requirements.txt

      - name: Run backend tests
        run: PYTHONPATH=apps/backend pytest apps/backend/tests

      - name: Validate Docker Compose file
        run: docker compose config

      - name: Build Docker Compose services
        run: docker compose build
