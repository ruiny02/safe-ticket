<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="640" viewBox="0 0 1040 640" role="img" aria-labelledby="title desc">
  <title id="title">PLS component cumulative explained variance</title>
  <desc id="desc">Line chart comparing X and Y risk cumulative explained variance for raw embedding PLS and PCA preprocessed PLS up to 50 components.</desc>
