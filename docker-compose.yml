services:
  db:
    image: pgvector/pgvector:pg16
    container_name: safe-ticket-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-safe_ticket}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-safe_ticket}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: safe-ticket-backend
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-local}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/safe_ticket}
      PIPELINE_BASE_URL: http://pipeline:8010
      PIPELINE_ANALYZE_PATH: ${PIPELINE_ANALYZE_PATH:-/api/v1/analyze}
      PIPELINE_TIMEOUT_SECONDS: ${PIPELINE_TIMEOUT_SECONDS:-10}
      THECHEAT_CDP_URL: ${THECHEAT_CDP_URL:-http://lookup-browser:9223}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      pipeline:
        condition: service_healthy
      lookup-browser:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/ready', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  lookup-browser:
    build:
      context: .
      dockerfile: docker/lookup-browser.Dockerfile
    container_name: safe-ticket-lookup-browser
    environment:
      SCREEN_RESOLUTION: ${LOOKUP_BROWSER_SCREEN_RESOLUTION:-1440x1000x24}
      THECHEAT_LOGIN_URL: ${THECHEAT_LOGIN_URL:-https://thecheat.co.kr/rb/?mod=ssl_login_otp}
    ports:
      - "${LOOKUP_BROWSER_PORT:-6080}:6080"
    shm_size: "1gb"
    volumes:
      - lookup_browser_profile:/data/profile
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9223/json/version >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: safe-ticket-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  pipeline:
    build:
      context: .
      dockerfile: docker/pipeline.Dockerfile
    container_name: safe-ticket-pipeline
    environment:
      APP_ENV: ${APP_ENV:-local}
      PIPELINE_PORT: ${PIPELINE_PORT:-8010}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/safe_ticket}
    ports:
      - "${PIPELINE_PORT:-8010}:8010"
    volumes:
      - ./apps/pipeline:/app/apps/pipeline
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  lookup_browser_profile:
