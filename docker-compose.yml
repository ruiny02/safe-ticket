services:
  db:
    image: pgvector/pgvector:pg16
    container_name: safe-ticket-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-safe_ticket}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-safe_ticket}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: safe-ticket-backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      BACKEND_PORT: ${BACKEND_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/safe_ticket}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./apps/backend:/app/apps/backend
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: safe-ticket-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    volumes:
      - ./apps/frontend:/workspace/apps/frontend

  pipeline:
    build:
      context: .
      dockerfile: docker/pipeline.Dockerfile
    container_name: safe-ticket-pipeline
    environment:
      APP_ENV: ${APP_ENV:-local}
      PIPELINE_PORT: ${PIPELINE_PORT:-8010}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/safe_ticket}
    ports:
      - "${PIPELINE_PORT:-8010}:8010"
    volumes:
      - ./apps/pipeline:/app/apps/pipeline
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
